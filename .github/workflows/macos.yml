# This is a basic workflow to help you get started with Actions

name: macos

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches: [ main ]
    tags: [ 'v*', '[0-9]*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  HIDAPI_VERSION: "0.15.0"

jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hidapitester

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          path: hidapitester
          fetch-depth: 0

      - name: fetch hidapi
        uses: actions/checkout@v6
        with:
          repository: libusb/hidapi
          ref: hidapi-${{ env.HIDAPI_VERSION }}
          path: hidapi

      - name: compile hidapitester Makefile
        shell: bash
        run: make

      - name: import signing certificate
        if: github.event_name != 'pull_request'
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: sign hidapitester
        if: github.event_name != 'pull_request'
        run: codesign --force --options runtime --timestamp --sign "${{ secrets.MACOS_SIGNING_IDENTITY }}" hidapitester

      - name: package hidapitester (Makefile)
        shell: bash
        run: make package

      - name: notarize hidapitester
        if: github.event_name != 'pull_request'
        run: |
          xcrun notarytool submit hidapitester-*.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait

      - name: run hidapitester (Makefile)
        shell: bash
        run: ./hidapitester --version && ./hidapitester --list && file ./hidapitester

      - name: Configure hidapitester with CMake
        run: |
          mkdir build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build hidapitester with CMake
        run: cmake --build build --config Release

      - name: Run hidapitester (CMake)
        run: ./build/hidapitester --version && ./build/hidapitester --list && file ./build/hidapitester

      - name: Upload hidapitester artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-macos
          path: hidapitester/hidapitester-*.zip
