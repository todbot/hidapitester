# This is a basic workflow to help you get started with Actions

name: macos

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: macos-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      # xcode 12.5 does not have Arm support?
      #- name: update to xcode w/ arm
      #  shell: bash
      #  run: |
      #    sudo rm -Rf /Library/Developer/CommandLineTools/SDKs/*
      #    sudo xcode-select -s "/Applications/Xcode_12.5.app"

      - name: fetch hidapi
        uses: actions/checkout@v6
        with:
          repository: https://github.com/libusb/hidapi
          path: hidapi

      - name: compile hidapitester Makefile
        shell: bash
        run: HIDAPI_DIR=./hidapi make

      - name: run hidapitester (Makefile)
        shell: bash
        run: ./hidapitester --version && ./hidapitester --list && file ./hidapitester

      - name: Configure hidapitester with CMake
        run: |
          mkdir build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build hidapitester with CMake
        run: cmake --build build --config Release

      - name: Run hidapitester (CMake)
        run: ./build/hidapitester --version && ./build/hidapitester --list && file ./build/hidapitester

      - name: Upload hidapitester artifacts (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-macos
          path: |
            hidapitester
            build/hidapitester
          retention-days: 2

      - name: Upload hidapitester artifacts (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-macos
          path: |
            hidapitester
            build/hidapitester
