# This is a basic workflow to help you get started with Actions

name: windows

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: setup prerequisites (windows)
        run: echo "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: fetch hidapi
        uses: actions/checkout@v6
        with:
          repository: https://github.com/libusb/hidapi
          path: hidapi

      - name: compile hidapitester Makefile
        shell: bash
        run: HIDAPI_DIR=./hidapi make

      - name: run hidapitester (Makefile)
        shell: bash
        run: ./hidapitester --version && ./hidapitester --list

      - name: Configure hidapitester with CMake
        run: |
          mkdir build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build hidapitester with CMake
        run: cmake --build build --config Release

      - name: Run hidapitester (CMake)
        run: build\Release\hidapitester.exe --version && build\Release\hidapitester.exe --list

      - name: Upload hidapitester artifacts (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-windows
          path: |
            build/Release/hidapitester.exe
          retention-days: 2

      - name: Upload hidapitester artifacts (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-windows
          path: |
            build/Release/hidapitester.exe
