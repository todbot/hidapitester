# This is a basic workflow to help you get started with Actions

name: windows

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches: [ main ]
    tags: [ 'v*', '[0-9]*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  HIDAPI_VERSION: "0.15.0"

jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: hidapitester

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          path: hidapitester

      - name: setup prerequisites (windows)
        run: echo "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        working-directory: ${{ github.workspace }}

      - name: fetch hidapi
        uses: actions/checkout@v6
        with:
          repository: libusb/hidapi
          ref: hidapi-${{ env.HIDAPI_VERSION }}
          path: hidapi

      - name: compile hidapitester Makefile
        shell: bash
        run: make

      - name: package hidapitester (Makefile)
        shell: pwsh
        run: Compress-Archive -Path hidapitester.exe -DestinationPath "hidapitester-windows-x86_64.zip"

      - name: run hidapitester (Makefile)
        shell: bash
        run: ./hidapitester --version && ./hidapitester --list

      - name: Configure hidapitester with CMake
        run: |
          mkdir build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build hidapitester with CMake
        run: cmake --build build --config Release

      - name: Run hidapitester (CMake)
        run: build\Release\hidapitester.exe --version && build\Release\hidapitester.exe --list

      - name: Upload hidapitester artifacts (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-windows
          path: hidapitester/hidapitester-*.zip
          retention-days: 2

      - name: Upload hidapitester artifacts (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: hidapitester-windows
          path: hidapitester/hidapitester-*.zip
