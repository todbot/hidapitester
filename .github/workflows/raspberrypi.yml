name: raspberrypi

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: hidapitester
      - uses: actions/checkout@v4
        with:
          repository: libusb/hidapi
          path: hidapi
      - uses: pguyot/arm-runner-action@v2
        with:
          base_image: raspios_lite_arm64:latest
          cpu: cortex-a53
          #base_image: raspios_lite:latest
          #cpu: cortex-a7
          copy_artifact_path: artifacts
          commands: |
            apt-get update
            apt-get install -y libudev-dev pkg-config build-essential
            cd hidapitester
            make
            make package
            mkdir -p ../artifacts
            cp *.zip ../artifacts/
            ls -la ../artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: hidapitester-raspberrypi
          path: artifacts/*.zip

